options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_CONTAINER_NAME}:$SHORT_SHA
      - .

  # 2. Push
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_CONTAINER_NAME}:$SHORT_SHA

  # 3. Crear service.yaml
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - -c
      - |
        cat <<EOF > service.yaml
        apiVersion: serving.knative.dev/v1
        kind: Service
        metadata:
          name: ${_SERVICE_NAME}
          annotations:
            run.googleapis.com/ingress: ${_INGRESS_TYPE}
        spec:
          template:
            spec:
              containers:
                - image: containerurl
                  ports:
                    - containerPort: ${_CONTAINER_PORT}
        EOF

        echo "===== VERIFICANDO SERVICE.YAML ====="
        cat service.yaml

  # 4. Crear skaffold.yaml con URL COMPLETA
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - -c
      - |
        cat <<EOF > skaffold.yaml
        apiVersion: skaffold/v4beta7
        kind: Config
        build:
          artifacts: 
            - image: containerurl
              context: .
              docker:
                dockerfile: Dockerfile
          tagPolicy:
            gitCommit: {}
        manifests:
          rawYaml:
            - service.yaml
        deploy:
          cloudrun: {}
        verify:
          - name: smoke-test
            container:
              name: smoke-test
              image: google/cloud-sdk:alpine
              command: ["sh"]
              args:
                - "-c"
                - |
                  # Obtenemos la URL del servicio usando las variables de Cloud Build
                  # Escapamos \$ para que el shell de la verificación lo ejecute en tiempo real
                  echo "Obteniendo URL para el servicio: ${_SERVICE_NAME} en ${_REGION}"
                  
                  SERVICE_URL=$$(gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --format='value(status.url)')
                  
                  echo "Probando URL: \$SERVICE_URL/${_HEALTH_CHECK}"
                  
                  # El token es obligatorio porque el ingress es INTERNAL
                  HTTP_CODE=\$(curl -s -o /dev/null -w "%{http_code}" \\
                    -H "Authorization: Bearer \$(gcloud auth print-identity-token)" \\
                    "\$SERVICE_URL/${_HEALTH_CHECK}")
                  
                  echo "Código HTTP recibido: \$HTTP_CODE"
                  
                  if [ "\$HTTP_CODE" != "200" ]; then
                    echo "Error: Health check falló con código \$HTTP_CODE"
                    exit 1
                  fi
                  echo "Health check pasado con éxito"
            timeout: 120s
        EOF

        echo "===== VERIFICANDO SKAFFOLD.YAML ====="
        cat skaffold.yaml

  # 5. Crear release uniendo todo
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - deploy
      - releases
      - create
      - release-${SHORT_SHA}
      - --delivery-pipeline=${_PIPELINE_NAME}
      - --region=${_REGION}
      - --source=.
      - --images=containerurl=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_CONTAINER_NAME}:$SHORT_SHA